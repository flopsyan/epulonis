name: epulonis

services:
  epulonis:
    build: .
    image: epulonis:latest
    container_name: epulonis
    restart: unless-stopped
    ports:
      # Host port is configurable via .env (PORT), default 3000
      - "${PORT:-3000}:3000"
    environment:
      SITE_NAME: ${SITE_NAME:-Epulonis}
      # Seed example data on the very first start (true/false)
      SEED_DEMO: ${SEED_DEMO:-true}
      NODE_ENV: production
      # Edit protection: leave AUTH_PASSWORD empty to keep the site read-only.
      AUTH_USER: ${AUTH_USER:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
    volumes:
      # Persistent data (SQLite database)
      - recipe-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  recipe-data:
